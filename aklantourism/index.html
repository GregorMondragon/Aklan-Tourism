    <style>
      :root {
        --font-heading: 'Palanquin Dark', sans-serif;
        --font-body: 'Montserrat', sans-serif;
      }

      /* Global CSS Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden; /* Prevent horizontal scroll from any potential overflow */
      }
      
      /* Skip-to-content link for accessibility */
      .skip-link {
        position: absolute;
        top: -100px;
        left: 16px;
        background: #0b1f45;
        color: #fff;
        padding: 12px 24px;
        border-radius: 0 0 12px 12px;
        font-family: var(--font-body);
        font-size: 0.9rem;
        font-weight: 600;
        text-decoration: none;
        z-index: 99999;
        transition: top 0.3s ease;
      }
      .skip-link:focus {
        top: 0;
        outline: 3px solid #64a0ff;
        outline-offset: 2px;
      }

      /* Apply clean, professional sans-serif to all standard text */
      body, p, a, li, span, button, input {
        font-family: var(--font-body) !important;
      }
      
      /* Apply impactful serif to all headings & logos */
      h1, h2, h3, h4, h5, h6, .logo {
        font-family: var(--font-heading) !important;
        letter-spacing: 0.5px;
      }
      
      /* Enhance specific typographic details */
      h1 { letter-spacing: 1px; }
      p { letter-spacing: 0.2px; }

      /* Global focus-visible styles for keyboard navigation */
      *:focus-visible {
        outline: 3px solid #64a0ff;
        outline-offset: 3px;
        border-radius: 4px;
      }

      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }

      /* ── Global Mobile Optimizations ── */

      /* Better tap highlight — subtle but non-jarring */
      * {
        -webkit-tap-highlight-color: rgba(0, 0, 0, 0.05);
      }

      /* Prevent text size adjustment on iOS rotation */
      body {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      /* Prevent images from overflowing their containers */
      img {
        max-width: 100%;
        height: auto;
      }

      /* Remove 300ms tap delay on interactive elements */
      button,
      [role="button"],
      [tabindex],
      a {
        touch-action: manipulation;
      }

      /* WCAG 2.5.5 — minimum tap target for interactive elements */
      button,
      [role="button"],
      input[type="button"],
      input[type="submit"] {
        min-height: 44px;
      }
    </style>
  </head>
